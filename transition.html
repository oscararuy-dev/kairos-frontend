<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kairos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #112030;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'DM Mono', monospace;
}

.scene {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; position: relative;
}

/* ── Logo mark ── */
.logo-wrap {
  position: relative; width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
}

.logo-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1.5px solid rgba(14,158,138,0.0);
  animation: ringExpand 1.4s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.logo-ring-2 {
  position: absolute; inset: 12px; border-radius: 50%;
  border: 1px solid rgba(14,158,138,0.0);
  animation: ringExpand 1.4s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes ringExpand {
  0% { border-color: rgba(14,158,138,0.0); transform: scale(0.6); }
  30% { border-color: rgba(14,158,138,0.5); }
  100% { border-color: rgba(14,158,138,0.12); transform: scale(1); }
}

.logo-bg {
  width: 80px; height: 80px; background: #0E9E8A;
  border-radius: 18px;
  opacity: 0; transform: scale(0.5) rotate(-10deg);
  animation: logoIn 0.7s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 60px rgba(14,158,138,0.4);
}

@keyframes logoIn {
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ── Swoosh lines ── */
.swoosh {
  position: absolute; inset: -40px;
  pointer-events: none;
}
.swoosh-line {
  position: absolute; top: 50%; left: 50%;
  width: 2px; height: 80px; transform-origin: 50% 0;
  background: linear-gradient(to bottom, rgba(14,158,138,0.6), transparent);
  border-radius: 2px;
  opacity: 0;
}

.swoosh-line:nth-child(1) { transform: rotate(0deg) translateX(-50%); animation: swooshLine 0.8s 0.8s ease-out forwards; }
.swoosh-line:nth-child(2) { transform: rotate(45deg) translateX(-50%); animation: swooshLine 0.8s 0.9s ease-out forwards; }
.swoosh-line:nth-child(3) { transform: rotate(90deg) translateX(-50%); animation: swooshLine 0.8s 1.0s ease-out forwards; }
.swoosh-line:nth-child(4) { transform: rotate(135deg) translateX(-50%); animation: swooshLine 0.8s 1.1s ease-out forwards; }
.swoosh-line:nth-child(5) { transform: rotate(180deg) translateX(-50%); animation: swooshLine 0.8s 1.0s ease-out forwards; }
.swoosh-line:nth-child(6) { transform: rotate(225deg) translateX(-50%); animation: swooshLine 0.8s 0.9s ease-out forwards; }
.swoosh-line:nth-child(7) { transform: rotate(270deg) translateX(-50%); animation: swooshLine 0.8s 0.8s ease-out forwards; }
.swoosh-line:nth-child(8) { transform: rotate(315deg) translateX(-50%); animation: swooshLine 0.8s 0.85s ease-out forwards; }

@keyframes swooshLine {
  0% { opacity: 0; height: 20px; }
  30% { opacity: 1; }
  100% { opacity: 0; height: 80px; }
}

/* ── Wordmark ── */
.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 48px; font-weight: 600;
  color: #F0F4F8; letter-spacing: -1px;
  opacity: 0; transform: translateY(12px);
  animation: wordIn 0.7s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes wordIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Tagline ── */
.tagline {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(148,163,184,0.0);
  margin-top: 12px;
  animation: tagIn 0.6s 1.1s ease forwards;
}

@keyframes tagIn {
  to { color: rgba(148,163,184,0.7); }
}

/* ── Progress bar ── */
.progress-track {
  width: 200px; height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px; margin-top: 40px;
  overflow: hidden;
  opacity: 0; animation: fadeIn 0.4s 1.2s ease forwards;
}
.progress-fill {
  height: 100%; background: #0E9E8A; border-radius: 2px;
  width: 0; animation: progressFill 1.6s 1.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes progressFill {
  to { width: 100%; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── Particle dots ── */
.particles {
  position: fixed; inset: 0; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; width: 3px; height: 3px;
  border-radius: 50%; background: rgba(14,158,138,0.4);
  animation: particleFloat linear infinite;
}

@keyframes particleFloat {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

/* ── Fade out whole scene ── */
body.fade-out {
  animation: sceneFadeOut 0.5s ease forwards;
}
@keyframes sceneFadeOut {
  to { opacity: 0; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="scene">
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring-2"></div>
    <div class="swoosh">
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
      <div class="swoosh-line"></div>
    </div>
    <div class="logo-bg">
      <svg width="42" height="56" viewBox="0 0 70 80" fill="none">
        <path d="M 28 5 C 45 10 60 21 56 40 C 52 58 44 70 28 75" stroke="rgba(4,52,42,0.80)" stroke-width="9.5" stroke-linecap="round" fill="none"/>
        <path d="M 28 5 C 46 10 61 22 57 40 C 53 58 44 71 28 75" stroke="#064034" stroke-width="7.0" stroke-linecap="round" fill="none"/>
        <path d="M 28.5 7 C 44 12 57 24 53.5 40 C 50 56 42.5 69 28.5 73" stroke="rgba(10,100,80,0.55)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M 28 5 Q 20 40 28 75" stroke="#F0F4F8" stroke-width="1.2" opacity="0.65" fill="none"/>
        <path d="M 1 57 Q 22 40.5 43 22" stroke="#F0F4F8" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <path d="M 43 22 L 38.5 28.5 L 40.5 25.5 L 44.5 30 L 47.5 26 Z" fill="#FFF0F3" opacity="0.95"/>
      </svg>
    </div>
  </div>

  <div class="wordmark">Kairos</div>
  <div class="tagline">Psychoeducational Evaluation</div>

  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>
</div>

<script>
// ── Particles ──
const container = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (4 + Math.random() * 6) + 's';
  p.style.animationDelay = (Math.random() * 4) + 's';
  p.style.opacity = (0.2 + Math.random() * 0.4).toString();
  container.appendChild(p);
}

// ── Chime ──
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      const start = ctx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.18, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 1.2);
      osc.start(start);
      osc.stop(start + 1.2);
    });
  } catch(e) {}
}

// ── Get redirect target ──
const params = new URLSearchParams(window.location.search);
const dest = params.get('to') || 'Kairos_Extraction.html';

// Play chime immediately — user gesture came from the click on previous page
playChime();

// Redirect after animation completes
setTimeout(() => {
  document.body.classList.add('fade-out');
  setTimeout(() => { window.location.href = dest; }, 500);
}, 3000);
</script>
</body>
</html>
