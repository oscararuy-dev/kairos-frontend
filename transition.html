<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kairos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #112030;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'DM Mono', monospace;
}

.scene {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; position: relative;
}

/* ── Logo mark ── */
.logo-wrap {
  position: relative; width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
}

.logo-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1.5px solid rgba(14,158,138,0.0);
  animation: ringExpand 1.4s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.logo-ring-2 {
  position: absolute; inset: 12px; border-radius: 50%;
  border: 1px solid rgba(14,158,138,0.0);
  animation: ringExpand 1.4s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes ringExpand {
  0% { border-color: rgba(14,158,138,0.0); transform: scale(0.6); }
  30% { border-color: rgba(14,158,138,0.5); }
  100% { border-color: rgba(14,158,138,0.12); transform: scale(1); }
}

.logo-bg {
  width: 80px; height: 80px; background: #0E9E8A;
  border-radius: 18px;
  opacity: 0; transform: scale(0.5) rotate(-10deg);
  animation: logoIn 0.7s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 60px rgba(14,158,138,0.4);
}

@keyframes logoIn {
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ── Swoosh lines ── */
.swoosh {
  position: absolute; inset: -40px;
  pointer-events: none;
}
.swoosh-line {
  position: absolute; top: 50%; left: 50%;
  width: 2px; height: 80px; transform-origin: 50% 0;
  background: linear-gradient(to bottom, rgba(14,158,138,0.6), transparent);
  border-radius: 2px;
  opacity: 0;
}

.swoosh-line:nth-child(1) { transform: rotate(0deg) translateX(-50%); animation: swooshLine 0.8s 0.8s ease-out forwards; }
.swoosh-line:nth-child(2) { transform: rotate(45deg) translateX(-50%); animation: swooshLine 0.8s 0.9s ease-out forwards; }
.swoosh-line:nth-child(3) { transform: rotate(90deg) translateX(-50%); animation: swooshLine 0.8s 1.0s ease-out forwards; }
.swoosh-line:nth-child(4) { transform: rotate(135deg) translateX(-50%); animation: swooshLine 0.8s 1.1s ease-out forwards; }
.swoosh-line:nth-child(5) { transform: rotate(180deg) translateX(-50%); animation: swooshLine 0.8s 1.0s ease-out forwards; }
.swoosh-line:nth-child(6) { transform: rotate(225deg) translateX(-50%); animation: swooshLine 0.8s 0.9s ease-out forwards; }
.swoosh-line:nth-child(7) { transform: rotate(270deg) translateX(-50%); animation: swooshLine 0.8s 0.8s ease-out forwards; }
.swoosh-line:nth-child(8) { transform: rotate(315deg) translateX(-50%); animation: swooshLine 0.8s 0.85s ease-out forwards; }

@keyframes swooshLine {
  0% { opacity: 0; height: 20px; }
  30% { opacity: 1; }
  100% { opacity: 0; height: 80px; }
}

/* ── Wordmark ── */
.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 48px; font-weight: 600;
  color: #F0F4F8; letter-spacing: -1px;
  opacity: 0; transform: translateY(12px);
  animation: wordIn 0.7s 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes wordIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Tagline ── */
.tagline {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(148,163,184,0.0);
  margin-top: 12px;
  animation: tagIn 0.6s 1.1s ease forwards;
}

@keyframes tagIn {
  to { color: rgba(148,163,184,0.7); }
}

/* ── Progress bar ── */
.progress-track {
  width: 200px; height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px; margin-top: 40px;
  overflow: hidden;
  opacity: 0; animation: fadeIn 0.4s 1.2s ease forwards;
}
.progress-fill {
  height: 100%; background: #0E9E8A; border-radius: 2px;
  width: 0; animation: progressFill 1.6s 1.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes progressFill {
  to { width: 100%; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── Particle dots ── */
.particles {
  position: fixed; inset: 0; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; width: 3px; height: 3px;
  border-radius: 50%; background: rgba(14,158,138,0.4);
  animation: particleFloat linear infinite;
}

@keyframes particleFloat {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

/* ── Fade out whole scene ── */
body.fade-out {
  animation: sceneFadeOut 0.5s ease forwards;
}
@keyframes sceneFadeOut {
  to { opacity: 0; }
}
</style>
</head>
